<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Personal Finance Tracker</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<main class="container">
<h1>Personal Finance Tracker</h1>


<section class="balance">
<div>Balance: <span id="balance">₹0</span></div>
<div>Income: <span id="income">₹0</span></div>
<div>Expenses: <span id="expenses">₹0</span></div>
</section>


<section class="form">
<h2>Add Transaction</h2>
<form id="txForm">
<select id="type"><option value="income">Income</option><option value="expense">Expense</option></select>
<input id="amount" type="number" placeholder="Amount" required />
<input id="category" placeholder="Category (e.g., Food)" required />
<input id="note" placeholder="Note (optional)" />
<input id="date" type="date" />
<button type="submit">Add</button>
</form>
</section>


<section class="charts">
<h2>Statistical Dashboard</h2>
<div class="chart-container">
<div class="chart-item">
<h3>Expense by Category</h3>
<canvas id="categoryChart"></canvas>
</div>
<div class="chart-item">
<h3>Income vs Expense</h3>
<canvas id="incomeExpenseChart"></canvas>
</div>
</div>
<div class="chart-container">
<div class="chart-item full-width">
<h3>Daily Trends</h3>
<canvas id="trendChart"></canvas>
</div>
</div>
</section>

<section class="list">
<h2>Transactions</h2>
<div id="filters">
<select id="filterType"><option value="">All</option><option value="income">Income</option><option value="expense">Expense</option></select>
<input id="filterCategory" placeholder="Category" />
<button id="btnFilter">Filter</button>
<button id="btnClear">Clear</button>
</div>


<ul id="txList"></ul>
</section>
</main>


<script src="app.js"></script>
</body>
</html>
